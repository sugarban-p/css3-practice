<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RWD主導覽練習檔</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Dosis&family=Mukta:wght@300&display=swap");
      /* font-family: 'Mukta', sans-serif; 
      font-family: 'Dosis';
      */
      /* 電腦與平板上應用的樣式 */

      * {
        box-sizing: border-box;
      }

      :root {
        --web-color: rgb(211, 157, 243);
        --option-bg: rgb(49, 41, 28);
        --nav-bg:  rgb(223, 192, 241);
        --nav-border-rad: 10px;
      }

      body {
        background-color: rgb(237, 237, 237);
        margin: 0px;
        font-size: 14px;
        color: var(--web-color);
        font-family: "Mukta";
      }

      li {
        list-style: none;
      }

      a {
        text-decoration: none;
        color: inherit;
      }

      header {
        width: 100%;
        background-color: var(--web-color);
        border-radius: 0 0 var(--nav-border-rad) var(--nav-border-rad);
        display: flex;
        justify-content: space-between;
      }

      .logo,
      .menu-icon {
        background-color: var(--option-bg);
        font-size: 22px;
        font-weight: bold;
        display: flex;
        align-items: center;
        text-align: center;
        padding: 0 25px;
      }

      .logo {
        border-radius: 0 var(--nav-border-rad) var(--nav-border-rad)
          var(--nav-border-rad);
      }

      .menu-icon {
        display: none;
        border-radius: var(--nav-border-rad) 0 0 var(--nav-border-rad);
      }

      .navbar ul {
        color: var(--option-bg);
        font-size: 16px;
        font-weight: bold;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        width: 450px;
        padding: 0 20px;
      }

      .navbar a {
        display: flex;
        border: 2px solid var(--option-bg);
        padding: 0 10px;
        border-radius: var(--nav-border-rad);
        justify-content: center;
      }

      .navbar ul li {
        line-height: 2em;
        text-align: center;
      }

      /* 手機 */
      @media screen and (max-width: 500px) {
        .logo {
          border-radius: 0 var(--nav-border-rad) var(--nav-border-rad) 0;
        }
        .menu-icon {
          display: flex;
        }
        header {
          flex-wrap: wrap;
        }
        .navbar {
          /* display: none; */
          padding-bottom: 10px;
          background-color: var(--nav-bg);
          border-radius: 0 0 var(--nav-border-rad) var(--nav-border-rad);
        }
        .navbar ul {
          width: 100vw;
          flex-direction: column;
          padding: 0;
          margin: 0;
        }
        .navbar a {
          border: none;
          border-radius: 0;
        }
        .navbar li {
          width: 60%;
          border-bottom: 2px solid var(--option-bg);
        }
        .navbar ul {
          border-top: 3px solid var(--option-bg);
        }
      }
    </style>
  </head>

  <body>
    <header class="header">
      <a href="" class="logo">My Web</a>
      <!-- <div class="logo"><a href="index.html">My Web</a></div> -->
      <div class="menu-icon">Menu</div>
      <nav class="navbar">
        <ul>
          <a href=""><li>About</li></a>
          <a href=""><li>Experience</li></a>
          <a href=""><li>Portfolio</li></a>
          <a href=""><li>Contact</li></a>
        </ul>
      </nav>
    </header>
  </body>
</html>
