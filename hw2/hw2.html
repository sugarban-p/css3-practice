<!doctype html>

    <title>Document</title>
    <style>

      * {

        margin: 0;
      }

      body {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-around;
        padding: 20px;
        min-width: 900px;
      }

      .box {
        position: relative;
        width: 18%;
        height: fit-content;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        margin-bottom: 30px;
      }

      .box .cover {
        width: 100%;
        height: 18vw;
        min-height: 162px;
        background-color: red;
      }

      .box div:last-child {
        display: block;
        width: 70%;
        line-height: 2em;
        height: 2em;
        overflow: hidden;
        text-align: left;
        font-size: 16px;
        margin: 0 10px 20px 10px;
      }

    </style>

  <script>
    const coverDivs = document.getElementsByClassName("cover");
    console.log(coverDivs);
    for (let coverDiv of coverDivs) {
