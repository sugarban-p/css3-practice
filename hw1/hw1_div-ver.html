<!doctype html>
<html lang="zh-hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        box-sizing: border-box;
      }

      .background {
        background: url("./super-mariobg.jpg") no-repeat;
        background-size: cover;
        height: 450px;
        width: 800px;
        position: absolute;
        top: 300px;
        left: 50%;
        transform: translateX(-50%);
        border: 5px solid black;
      }

      .logo {
        width: 100px;
        position: absolute;
      }

      .character {
        width: 30px;
        position: absolute;
        top: 79%;
        left: 50%;
        transform: translateX(-50%);
      }

    </style>
  </head>
  <body>


    <div class="background">

      <img src="./logo.png" alt="" class="logo">

      <img src="./sprite.png" alt="" class="character">

    </div>

  </body>
</html>
