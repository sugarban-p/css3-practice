<!doctype html>
<html lang="zh-hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      body {
        background-image: url("super-mariobg.jpg");
        background-size: 100%;
        background-repeat: no-repeat;
        background-position: center top;
      }
      .logo {
        position: fixed;
        top: 10px;
        left: 10px;
        width: 15vw;
      }
      .character {
        position: fixed;
        left: 50%;
        top: calc(100vw * 0.43);
        width: 4.5vw;
      }
      img {
        width: 100%;
      }
    </style>
  </head>
  <body>

    <div class="logo">
      <img src="./logo.png" alt="">
    </div>

    <div class="character">
      <img src="./sprite.png" alt="">
    </div>

  </body>
</html>
