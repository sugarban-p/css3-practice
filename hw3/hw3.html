<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap");

      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
        font-family: "Jost";
        font-size: 20px;
      }

      a {
        text-decoration: none;
        color: black;
      }

      :root {
        --mobile-nav-bg: rgba(223, 223, 223, 0.8);
      }

      ul {
        list-style: none;
      }

      header {
        background-color: rgba(255, 255, 255, 0.65);
        position: fixed;
        top: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 140px;
      }

      .container {
        width: 1200px;
        height: 50px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .menu-icon {
        display: none;
        font-size: 32px;
      }

      nav {
        width: 624px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      nav ul {
        width: 572px;
        display: flex;
        justify-content: space-between;
      }

      nav li,
      .search .text {
        line-height: 2.5em;
      }

      nav li {
        text-align: center;
        padding: auto 0;
      }

      .search {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .search .icon {
        font-size: 21px;
      }

      .search .text {
        display: none;
      }

      main {
        margin-top: 140px;
      }

      #banner .container {
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: url(./banner-pc.jpg);
        width: 100%;
        height: calc(100vw * 1080 / 1920);
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        border-radius: 0 0 0 200px;
      }

      @media screen and (max-width: 900px) {
        body {
          width: 100%;
        }

        header {
          height: 90px;
          padding: 0 21px;
        }

        .container {
          width: 100%;
          height: 50px;
          flex-wrap: wrap;
          justify-content: space-between;
        }

        .menu-icon {
          display: block;
        }

        nav {
          width: 100%;
          margin-top: 12px;
          flex-direction: column;
        }

        nav ul {
          width: 100%;
          display: flex;
          flex-direction: column;
          justify-content: space-between;
          background-color: var(--mobile-nav-bg);
        }

        nav ul a:nth-child(2n) {
          background-color: rgba(194, 194, 194, 0.8);
        }

        .search {
          width: 100%;
          background-color: var(--mobile-nav-bg);
        }

        .search * {
          margin: 0 5px;
        }

        .search .text {
          display: block;
        }

        main {
          margin-top: 90px;
        }

        #banner .container {
          background-image: url(./banner-mobile.jpg);
          height: calc(100vw * 524 / 468);
          border-radius: 0 0 0 150px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <a class="logo" href="">
          <img src="./Logo.svg" alt="LOGO" />
        </a>
        <i class="menu-icon fa-solid fa-bars"></i>
        <nav>
          <ul>
            <a href=""><li>Home</li></a>
            <a href=""><li>Pages</li></a>
            <a href=""><li>Services</li></a>
            <a href=""><li>Project</li></a>
            <a href=""><li>Blog</li></a>
            <a href=""><li>Contact</li></a>
          </ul>
          <a class="search" href=""
            >
              <i class="icon fa-solid fa-magnifying-glass"></i>
              <div class="text">Search</div>
            </a
          >
        </nav>
      </div>
    </header>

    <main>
      <section id="banner">
        <div class="container"></div>
      </section>
    </main>
  </body>
</html>
