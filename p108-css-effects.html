<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
    <style>
      /* 全域 */
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
      }
      .hw {
        display: flex;
        align-items: center;
        height: fit-content;
      }

      /* q1 */
      .q1 * {
        font-family: "Open Sans";
      }

      .q1 {
        margin: 50px 50px;
        padding: 30px;
        background-color: #e9eeef;
        width: fit-content;
        height: fit-content;
        border-top-left-radius: 15px;
      }

      form {
        width: 280px;
        height: 195px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
      }

      h2 {
        font-weight: normal;
        color: #748182;
        text-shadow: 0px 0 2px #acb4b4;
        margin: 0;
      }

      .q1 .input-area {
        width: 100%;
        height: fit-content;
        display: flex;
        flex-direction: column;
      }

      input,
      .forget {
        color: #a1a1a1;
        font-weight: bold;
        font-size: 12px;
        letter-spacing: -0.8px;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 5px 0;
        border: none;
        border-radius: 5px;
      }

      .button-area {
        width: 100%;
        display: flex;
        justify-content: space-between;
      }

      button {
        border: none;
        text-align: center;
        cursor: pointer;
      }

      .submit {
        width: 40%;
        background-color: #2f8dd2;
        color: white;
        font-size: 12px;
        text-shadow: 0 0 2px #bddbf1;
        padding: 10px;
        border-radius: 5px;
        box-shadow: 0 2px 2px #2970a3;
      }

      .forget {
        background-color: #e9eeef;
        padding: 0 15px;
      }

      .forget:hover {
        text-decoration: underline;
        color: rgb(75, 75, 75);
      }

      /* q2 */
      :root {
        --bar-width: 150px;
      }

      .q2 * {
        font-family: "Roboto";
        font-weight: bold;
        font-size: 20px;
        text-align: center;
      }

      .q2 {
        margin: 50px 50px;
        width: fit-content;
        height: 100%;
      }

      [class^="nav-"] {
        position: relative;
        width: var(--bar-width);
        height: 54px;
        transform-style: preserve-3d;
        transition: transform 0.5s;
      }

      [class^="nav-"]:hover {
        transform: rotateY(-90deg);
      }

      .main,
      .side {
        position: absolute;
        width: 100%;
        height: 100%;
        padding: 15px;
      }

      .main {
        transform: translateZ(calc(var(--bar-width) / 2));
        color: #532d08;
        text-shadow: 0 0 2px #ffffff;
        background-image: radial-gradient(
          circle,
          #ee9541,
          #ee9541,
          #ee9541,
          #d07e2b
        );
      }

      .side {
        transform: translateX(50%) rotateY(90deg);
        color: #fff;
        text-shadow: 0 0 2px #532d08;
        background-image: radial-gradient(circle, #bc7631, #bc7631, #a6692d);
      }
    </style>
  </head>
  <body>
    <div class="hw">
      <!-- q1. Login表單 -->
      <div class="container q1">
        <form action="" method="get">
          <h2>Login Information</h2>
          <div class="input-area">
            <input
              type="text"
              id="userName"
              name="userName"
              placeholder="Enter Username"
            />
            <input
              type="password"
              id="userPwd"
              name="userPwd"
              placeholder="Enter Password"
            />
          </div>
          <div class="button-area">
            <button class="submit">Login</button>
            <button class="forget">Forgot your password?</button>
          </div>
        </form>
      </div>

      <!-- q2. 3D選單 -->
      <div class="container q2">
        <div class="nav-1">
          <div class="main">Home</div>
          <div class="side">Home</div>
        </div>
        <div class="nav-2">
          <div class="main">About</div>
          <div class="side">About</div>
        </div>
        <div class="nav-3">
          <div class="main">Clients</div>
          <div class="side">Clients</div>
        </div>
        <div class="nav-4">
          <div class="main">Work</div>
          <div class="side">Work</div>
        </div>
        <div class="nav-5">
          <div class="main">Contact Us</div>
          <div class="side">Contact Us</div>
        </div>
      </div>
    </div>
  </body>
</html>
